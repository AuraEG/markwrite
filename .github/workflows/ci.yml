name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck
        continue-on-error: true # [*] bits-ui types have known issues with Svelte 5

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test -- -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./apps/web/coverage
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # Deployment Jobs (only on main branch push)
  # ==========================================================================

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel deployment secrets
        id: vercel-secrets
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Vercel deploy secrets are missing; skipping web deployment."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        if: steps.vercel-secrets.outputs.skip == 'false'
        id: deploy
        run: |
          DEPLOY_URL=$(
            npx --yes vercel@latest deploy --prod --yes --token "${VERCEL_TOKEN}" --no-color \
              | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1
          )

          if [ -z "${DEPLOY_URL}" ]; then
            echo "Failed to detect Vercel deployment URL from CLI output."
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "Vercel deployment URL: ${DEPLOY_URL}"

  deploy-sync:
    name: Deploy Sync Server
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Hugging Face deployment secrets
        id: hf-secrets
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_USERNAME}" ] || [ -z "${HF_SPACE_NAME}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Hugging Face deploy secrets are missing; skipping sync deployment."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Hugging Face Space
        if: steps.hf-secrets.outputs.skip == 'false'
        run: |
          chmod +x scripts/deploy-sync-to-hf.sh
          scripts/deploy-sync-to-hf.sh

  # ==========================================================================
  # Database Migration (on main branch only)
  # ==========================================================================

  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @markwrite/web db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
